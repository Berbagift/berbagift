version: '3.8'

services:
  # ── MySQL 8 ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bagithr_db_prod
    restart: always
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-1234567890}
      - MYSQL_DATABASE=${DB_NAME:-bagithr}
      - MYSQL_ROOT_HOST=%
    volumes:
      - db_data_prod:/var/lib/mysql
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 30s

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_prod
    env_file:
      - .env
    environment:
      - APP_ENV=production
    ports:
      - "8005:8000"
    depends_on:
      - db
    restart: always
    healthcheck:
      test:
        ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Adminer (MySQL browser) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bagithr_adminer_prod
    ports:
      - "8082:8080"
    depends_on:
      - db

volumes:
  db_data_prod:
