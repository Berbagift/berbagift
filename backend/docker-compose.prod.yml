version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bagithr_db_prod
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-bagithr}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_prod
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  mysql_data_prod:
