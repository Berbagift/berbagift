version: '3.8'

services:
  # ── FastAPI Backend (production image) ──────────────────────
  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_prod
    env_file:
      - .env
    environment:
      - APP_ENV=production
    ports:
      - "8005:8000"
    restart: always
    healthcheck:
      test:
        ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Adminer (MySQL browser) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bagithr_adminer_prod
    ports:
      - "8082:8080"
