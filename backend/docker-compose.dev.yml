version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bagithr_db_dev
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_DATABASE: ${DB_NAME:-bagithr}
      MYSQL_USER: ${DB_USER:-bagithr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bagithr_pass}

    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: dev
    container_name: bagithr_backend_dev
    env_file:
      - .env
    environment:
      - DB_HOST=db
    ports:
      - "8000:8000"
    volumes:
      # Bind mount for hot-reloading in development
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data_dev:
