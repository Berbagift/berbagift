version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bagithr_db_dev
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bagithr}

    volumes:
      - db_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: dev
    container_name: bagithr_backend_dev
    env_file:
      - .env
    environment:
      - DB_HOST=db
    ports:
      - "8000:8000"
    volumes:
      # Bind mount for hot-reloading in development
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data_dev:
