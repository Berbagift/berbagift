version: '3.8'

services:
  # ── MySQL 8 ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bagithr_db_dev
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_DATABASE: ${DB_NAME:-bagithr}
    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"]
      timeout: 5s
      retries: 10
      interval: 5s
      start_period: 10s

  # ── MongoDB 6 ───────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: bagithr_mongo_dev
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-bagithr_indexer}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --eval 'db.adminCommand(\"ping\")' -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin"
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── FastAPI Backend (dev / hot-reload) ──────────────────────
  backend:
    build:
      context: .
      target: dev
    container_name: bagithr_backend_dev
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-password}@mongo:27017/${MONGO_DB_NAME:-bagithr_indexer}?authSource=admin
      - APP_ENV=development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Adminer (MySQL browser) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bagithr_adminer_dev
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data_dev:
  mongo_data_dev:
