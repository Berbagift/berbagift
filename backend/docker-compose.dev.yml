version: '3.8'

services:
  # ── FastAPI Backend (dev / hot-reload) ──────────────────────
  backend:
    build:
      context: .
      target: dev
    container_name: bagithr_backend_dev
    env_file:
      - .env
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Adminer (MySQL browser) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bagithr_adminer_dev
    ports:
      - "8080:8080"
