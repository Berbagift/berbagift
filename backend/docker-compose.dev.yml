version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bagithr_db_dev
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-bagithr}
      MYSQL_USER: ${DB_USER:-bagithr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bagithr_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data_dev:/var/lib/mysql

  backend:
    build:
      context: .
      target: dev
    container_name: bagithr_backend_dev
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Bind mount for hot-reloading in development
      - .:/app
    depends_on:
      - db

volumes:
  db_data_dev:
