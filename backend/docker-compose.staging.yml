version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bagithr_db_staging
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-bagithr}
      MYSQL_USER: ${DB_USER:-bagithr_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bagithr_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data_staging:/var/lib/mysql

  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_staging
    env_file:
      - .env
    environment:
      - APP_ENV=staging
    ports:
      - "8001:8000"
    depends_on:
      - db

volumes:
  db_data_staging:
