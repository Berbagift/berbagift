version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bagithr_db_staging
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bagithr}

    volumes:
      - db_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: prod
    container_name: bagithr_backend_staging
    env_file:
      - .env
    environment:
      - APP_ENV=staging
      - DB_HOST=db
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data_staging:
